org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Avoid Kotlin incremental cache "Storage is already registered" failures on Windows when
# plugins build inside Pub Cache (e.g. shared_preferences_android) — fixes flaky assembleDebug / missing APK.
kotlin.incremental=false
